name: Demo CI Env secrets

on:
    push
    # workflow_dispatch
env:
  GLOBAL_APP_ENV: global-dev

jobs:
    build:
        runs-on: ubuntu-latest

        env:
          Job_APP_ENV: job-dev

        steps:
            - name: Say Hello
              run: echo "Hello form the seconf workflow!"
            
            - name: Install
              env:
                APP_ENV: dev
                DB_PASSWORD: ${{ secrets.DB_PASSWORD}}
              run: echo "Environment $APP_ENV using $DB_PASSWORD,$GLOBAL_APP_ENV,$Job_APP_ENV"
            
            - name: Create demo file
              run: |
                echo "Hello from CI pipeline" > demo.txt
                echo "File created successfully"   

            - name: Upload Demo
              uses: actions/upload-artifact@v7
              with:
                name: build-artifict-demo
                path: .